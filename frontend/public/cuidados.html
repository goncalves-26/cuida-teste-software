<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Registro de Cuidado</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Registro de Cuidado</h1><p>Registro de atividades de cuidado realizadas com o idoso.</p><form id="formCuidado"><div class="form-group"><label for="descricao">Descrição do cuidado</label><input id="descricao" type="text" placeholder="Ex.: Verificar pressão arterial"></div><div class="form-group"><label for="data">Data</label><input id="data" type="date"></div><div class="form-group"><label for="responsavel">Responsável</label><input id="responsavel" type="text" placeholder="Ex.: Ana Paula"></div><div class="form-group"><label for="idosoId">ID do idoso</label><input id="idosoId" type="number" value="1"></div><button id="btnRegistrarCuidado" type="submit">Registrar cuidado</button></form><div id="mensagem"></div><div class="nav"><a href="/cadastro">Cadastro</a><a href="/idosos/novo">Idoso</a><a href="/medicamentos/novo">Medicamentos</a><a href="/idosos">Lista</a></div></main><script>const form=document.getElementById("formCuidado"),mensagem=document.getElementById("mensagem");function mostrarMensagem(t,c){mensagem.textContent=t;mensagem.className=c}form.addEventListener("submit",async e=>{e.preventDefault();const descricao=document.getElementById("descricao").value.trim(),data=document.getElementById("data").value.trim(),responsavel=document.getElementById("responsavel").value.trim(),idosoId=Number(document.getElementById("idosoId").value);if(!descricao){mostrarMensagem("Descrição obrigatória","erro");return}if(!data){mostrarMensagem("Data obrigatória","erro");return}if(!responsavel){mostrarMensagem("Responsável obrigatório","erro");return}try{const r=await fetch("http://localhost:8080/api/cuidados",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({descricao,data,responsavel,idosoId})});const d=await r.json();mostrarMensagem(d.message,r.ok?"sucesso":"erro")}catch(err){mostrarMensagem("Erro ao conectar com a API","erro")}});</script></body></html>
