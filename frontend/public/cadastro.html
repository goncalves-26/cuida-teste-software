<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CUIDA+ - Cadastro de Usuário</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <h1>CUIDA+ - Cadastro de Usuário</h1>
    <p>Cadastro de familiar ou responsável pelo acompanhamento da rotina de cuidado.</p>

    <form id="formCadastro">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" placeholder="Ex.: Ana Paula">
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="text" placeholder="Ex.: ana@email.com">
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="Mínimo de 8 caracteres">
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha</label>
        <input id="confirmarSenha" name="confirmarSenha" type="password" placeholder="Repita a senha">
      </div>

      <button id="btnCadastrar" type="submit">Cadastrar</button>
    </form>

    <div id="mensagem"></div>

    <div class="nav">
      <a href="/idosos/novo">Ir para cadastro de idoso</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("formCadastro");
    const mensagem = document.getElementById("mensagem");

    function mostrarMensagem(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className = tipo;
    }

    function emailValido(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const confirmarSenha = document.getElementById("confirmarSenha").value;

      if (!nome) {
        mostrarMensagem("Nome obrigatório", "erro");
        return;
      }

      if (!emailValido(email)) {
        mostrarMensagem("E-mail inválido", "erro");
        return;
      }

      if (!senha || senha.length < 8) {
        mostrarMensagem("Senha inválida", "erro");
        return;
      }

      if (senha !== confirmarSenha) {
        mostrarMensagem("Senhas diferentes", "erro");
        return;
      }

      try {
        const resposta = await fetch("http://localhost:8080/api/usuarios", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ nome, email, senha })
        });

        const dados = await resposta.json();
        mostrarMensagem(dados.message, resposta.ok ? "sucesso" : "erro");
      } catch (erro) {
        mostrarMensagem("Erro ao conectar com a API", "erro");
      }
    });
  </script>
</body>
</html>
