<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Cadastro de Usuário</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Cadastro de Usuário</h1><p>Cadastro de familiar ou responsável pelo acompanhamento da rotina de cuidado.</p><form id="formCadastro"><div class="form-group"><label for="nome">Nome</label><input id="nome" name="nome" type="text" placeholder="Ex.: Ana Paula"></div><div class="form-group"><label for="email">E-mail</label><input id="email" name="email" type="text" placeholder="Ex.: ana@email.com"></div><div class="form-group"><label for="senha">Senha</label><input id="senha" name="senha" type="password" placeholder="Mínimo de 8 caracteres"></div><div class="form-group"><label for="confirmarSenha">Confirmar senha</label><input id="confirmarSenha" name="confirmarSenha" type="password" placeholder="Repita a senha"></div><button id="btnCadastrar" type="submit">Cadastrar</button></form><div id="mensagem"></div><div class="nav"><a href="/login">Login</a><a href="/idosos/novo">Cadastro de idoso</a><a href="/medicamentos/novo">Medicamentos</a><a href="/cuidados/novo">Cuidados</a><a href="/idosos">Lista de idosos</a></div></main><script>const form=document.getElementById("formCadastro"),mensagem=document.getElementById("mensagem");function mostrarMensagem(t,cl){mensagem.textContent=t;mensagem.className=cl}function emailValido(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}form.addEventListener("submit",async function(event){event.preventDefault();const nome=document.getElementById("nome").value.trim(),email=document.getElementById("email").value.trim(),senha=document.getElementById("senha").value,confirmarSenha=document.getElementById("confirmarSenha").value;if(!nome){mostrarMensagem("Nome obrigatório","erro");return}if(!emailValido(email)){mostrarMensagem("E-mail inválido","erro");return}if(!senha||senha.length<8){mostrarMensagem("Senha inválida","erro");return}if(senha!==confirmarSenha){mostrarMensagem("Senhas diferentes","erro");return}try{const resposta=await fetch("http://localhost:8080/api/usuarios",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nome,email,senha})});const dados=await resposta.json();mostrarMensagem(dados.message,resposta.ok?"sucesso":"erro")}catch(e){mostrarMensagem("Erro ao conectar com a API","erro")}});</script></body></html>
