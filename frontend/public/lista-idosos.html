<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Lista de Idosos</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Lista de Idosos</h1><p>Consulta simples de idosos cadastrados no sistema.</p><form id="formBusca"><div class="form-group"><label for="busca">Buscar por nome</label><input id="busca" type="text" placeholder="Ex.: José"></div><button id="btnBuscar" type="submit">Buscar</button><button id="btnListarTodos" type="button">Listar todos</button></form><div id="mensagem"></div><ul id="lista"></ul><div class="nav"><a href="/cadastro">Cadastro</a><a href="/idosos/novo">Idoso</a><a href="/medicamentos/novo">Medicamentos</a><a href="/cuidados/novo">Cuidados</a></div></main><script>const form=document.getElementById("formBusca"),btnListarTodos=document.getElementById("btnListarTodos"),mensagem=document.getElementById("mensagem"),lista=document.getElementById("lista");function mostrarMensagem(t,c){mensagem.textContent=t;mensagem.className=c}function renderizar(idosos){lista.innerHTML="";idosos.forEach(i=>{const li=document.createElement("li");li.textContent=`${i.nome} - ${i.idade} anos`;lista.appendChild(li)})}async function buscar(nome=""){const url=nome?`http://localhost:8080/api/idosos?nome=${encodeURIComponent(nome)}`:"http://localhost:8080/api/idosos";try{const r=await fetch(url);const d=await r.json();renderizar(d.data||[]);mostrarMensagem(d.message||"Consulta realizada com sucesso",r.ok?"sucesso":"erro")}catch(err){mostrarMensagem("Erro ao conectar com a API","erro")}}form.addEventListener("submit",e=>{e.preventDefault();buscar(document.getElementById("busca").value.trim())});btnListarTodos.addEventListener("click",()=>{document.getElementById("busca").value="";buscar()});buscar();</script></body></html>
