<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Cadastro de Medicamento</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Cadastro de Medicamento</h1><p>Registro de medicamentos utilizados pelo idoso.</p><form id="formMedicamento"><div class="form-group"><label for="nome">Nome do medicamento</label><input id="nome" type="text" placeholder="Ex.: Losartana"></div><div class="form-group"><label for="dosagem">Dosagem</label><input id="dosagem" type="text" placeholder="Ex.: 50mg"></div><div class="form-group"><label for="horario">Horário</label><input id="horario" type="time"></div><div class="form-group"><label for="idosoId">ID do idoso</label><input id="idosoId" type="number" value="1"></div><button id="btnCadastrarMedicamento" type="submit">Cadastrar medicamento</button></form><div id="mensagem"></div><div class="nav"><a href="/cadastro">Cadastro</a><a href="/idosos/novo">Idoso</a><a href="/cuidados/novo">Cuidados</a><a href="/idosos">Lista</a></div></main><script>const form=document.getElementById("formMedicamento"),mensagem=document.getElementById("mensagem");function mostrarMensagem(t,c){mensagem.textContent=t;mensagem.className=c}form.addEventListener("submit",async e=>{e.preventDefault();const nome=document.getElementById("nome").value.trim(),dosagem=document.getElementById("dosagem").value.trim(),horario=document.getElementById("horario").value.trim(),idosoId=Number(document.getElementById("idosoId").value);if(!nome){mostrarMensagem("Nome do medicamento obrigatório","erro");return}if(!dosagem){mostrarMensagem("Dosagem obrigatória","erro");return}if(!horario){mostrarMensagem("Horário obrigatório","erro");return}try{const r=await fetch("http://localhost:8080/api/medicamentos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nome,dosagem,horario,idosoId})});const d=await r.json();mostrarMensagem(d.message,r.ok?"sucesso":"erro")}catch(err){mostrarMensagem("Erro ao conectar com a API","erro")}});</script></body></html>
