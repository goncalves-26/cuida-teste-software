<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Cadastro de Idoso</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Cadastro de Idoso</h1><p>Cadastro de idoso vinculado ao familiar ou responsável.</p><form id="formCadastroIdoso"><div class="form-group"><label for="nome">Nome do idoso</label><input id="nome" name="nome" type="text" placeholder="Ex.: José Carlos"></div><div class="form-group"><label for="idade">Idade</label><input id="idade" name="idade" type="number" placeholder="Ex.: 60"></div><div class="form-group"><label for="responsavelId">ID do responsável</label><input id="responsavelId" name="responsavelId" type="number" value="1"></div><div class="form-group"><label for="observacoes">Observações</label><textarea id="observacoes" name="observacoes" rows="4" placeholder="Ex.: Necessita acompanhamento diário."></textarea></div><button id="btnCadastrar" type="submit">Cadastrar idoso</button></form><div id="mensagem"></div><div class="nav"><a href="/cadastro">Cadastro de usuário</a><a href="/login">Login</a><a href="/medicamentos/novo">Medicamentos</a><a href="/cuidados/novo">Cuidados</a><a href="/idosos">Lista de idosos</a></div></main><script>const form=document.getElementById("formCadastroIdoso"),mensagem=document.getElementById("mensagem");function mostrarMensagem(t,cl){mensagem.textContent=t;mensagem.className=cl}form.addEventListener("submit",async function(event){event.preventDefault();const nome=document.getElementById("nome").value.trim(),idade=Number(document.getElementById("idade").value),responsavelId=Number(document.getElementById("responsavelId").value),observacoes=document.getElementById("observacoes").value.trim();if(!nome){mostrarMensagem("Nome obrigatório","erro");return}if(!idade||idade<60){mostrarMensagem("Idade mínima inválida","erro");return}try{const resposta=await fetch("http://localhost:8080/api/idosos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nome,idade,responsavelId,observacoes})});const dados=await resposta.json();mostrarMensagem(dados.message,resposta.ok?"sucesso":"erro")}catch(e){mostrarMensagem("Erro ao conectar com a API","erro")}});</script></body></html>
