<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CUIDA+ - Login</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><h1>CUIDA+ - Login</h1><p>Autenticação simples do familiar responsável.</p><form id="formLogin"><div class="form-group"><label for="email">E-mail</label><input id="email" name="email" type="text" value="familiar@email.com"></div><div class="form-group"><label for="senha">Senha</label><input id="senha" name="senha" type="password" value="12345678"></div><button id="btnEntrar" type="submit">Entrar</button></form><div id="mensagem"></div><div class="nav"><a href="/cadastro">Cadastro</a><a href="/idosos/novo">Idoso</a><a href="/medicamentos/novo">Medicamentos</a><a href="/cuidados/novo">Cuidados</a><a href="/idosos">Lista</a></div></main><script>const form=document.getElementById("formLogin"),mensagem=document.getElementById("mensagem");function mostrarMensagem(t,c){mensagem.textContent=t;mensagem.className=c}function emailValido(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}form.addEventListener("submit",async e=>{e.preventDefault();const email=document.getElementById("email").value.trim(),senha=document.getElementById("senha").value;if(!emailValido(email)){mostrarMensagem("E-mail inválido","erro");return}if(!senha||senha.length<8){mostrarMensagem("Senha inválida","erro");return}try{const r=await fetch("http://localhost:8080/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,senha})});const d=await r.json();mostrarMensagem(d.message,r.ok?"sucesso":"erro")}catch(err){mostrarMensagem("Erro ao conectar com a API","erro")}});</script></body></html>
